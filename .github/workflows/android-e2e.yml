name: Android e2e (emulator + LSPatch)

# The ONLY test that exercises the full on-device path: it boots an emulator,
# uses LSPatch (non-root) to embed the rosetta example module into the victim
# APK, installs + launches it, and asserts via logcat that the Rosetta-resolved
# hooks fired. It covers BOTH resolution paths:
#
#   STATIC  (the original assertion): TicketService#formatTicket (`a.b#c`) IS in
#     the bundled map. MainActivity logs the result under `RosettaVictim`; with
#     the module active it reads `HOOKED(ticket:T-123)` instead of `ticket:T-123`.
#
#   DYNAMIC (rosetta-xposed#22): AuditService#auditTicket (`c.d#e`) is
#     DELIBERATELY ABSENT from the map, so the module resolves it by LIVE DexKit
#     discovery (real native on ART — the last untested layer). Three sub-checks,
#     all driven by the module's DiscoveryObserver markers under
#     `RosettaDiscovery` plus the victim's `RosettaVictimDyn` result tag:
#       1. static miss → DexKit DISCOVERED → hook fires (`DHOOKED(...)`);
#       2. relaunch → SERVED_FROM_CACHE, no rescan (PersistentDiscoveryCache
#          survived the process restart);
#       3. version bump (a 101 victim APK) → CACHE_INVALIDATED → re-DISCOVERED.
#
# Why LSPatch and not LSPosed: running LSPosed in CI needs Magisk root + a
# Zygisk module on the AVD (no turnkey action, very flaky). LSPatch patches the
# target APK to self-load the module — no root, vanilla emulator.
#
# This job is ADVISORY (`continue-on-error: true`, never a required gate):
# emulator boot + the LSPatch loader are slow and inherently flaky, and the
# dynamic path adds a real native `.so` load and DexKit scan on top — strictly
# MORE device-dependent than the static path, so it firmly stays advisory rather
# than a gated check (rosetta-xposed#22 decision). The always-required gate is
# the plain-JVM `./gradlew build` in ci.yml, which fully covers the observer /
# cache / invalidation LOGIC this job only smoke-tests on a real device. It runs
# nightly, on demand, and when the Android example (or the layers it depends on)
# changes.
#
# SPEED + STABILITY: the slow part is a cold emulator boot (~4 min) which also
# races the runner's post-boot setup (the infamous `cmd: ... Broken pipe (32)`
# on `settings put`). We adopt the documented android-emulator-runner snapshot
# pattern: boot once on a cache miss, save a snapshot, cache it, then RESTORE it
# (`-no-snapshot-save`) on the run step so the system is already warm — both far
# faster and past the cold-boot binder race. PRs boot a lighter API 30 image;
# the nightly / on-demand runs stay on API 34 for representativeness.

on:
    schedule:
        - cron: '0 4 * * *' # nightly 04:00 UTC
    workflow_dispatch: {}
    pull_request:
        paths:
            - 'examples/android/**'
            - 'xposed-android/**'
            - '.github/workflows/android-e2e.yml'

permissions:
    contents: read

concurrency:
    group: android-e2e-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    e2e:
        name: emulator + LSPatch hook assertion (advisory)
        runs-on: ubuntu-latest
        # Advisory — never block a merge on emulator/LSPatch flakiness.
        continue-on-error: true
        env:
            DEVELOCITY_INJECTION_ENABLED: 'false'
            # Authenticated gh avoids the unauthenticated API rate limit when
            # downloading the LSPatch release from another public repo.
            GH_TOKEN: ${{ github.token }}
            # Pin the LSPatch release tag + the exact CLI asset name below.
            # Verify CLI flags against `java -jar "$LSPATCH_JAR" --help` on the
            # first real run. (v0.8 ships lspatch.jar + lspatch-debug.jar.)
            # v0.7 (not the newest v0.8): v0.8's embedded-module loader
            # deterministically crashes loading this module's entry class with a
            # stack-less NoClassDefFoundError, while the bare patched app runs —
            # a v0.8 module-loading regression. v0.7 ships the same lspatch.jar
            # asset + CLI flags.
            LSPATCH_TAG: v0.7
            # API 34 (Android 14) everywhere. LSPatch v0.8's metaloader
            # (LSPAppComponentFactoryStub) crashes at process init on API 30
            # (proven with a no-module control: the bare patched app also dies),
            # but v0.8 targets modern Android and 34 is the victim's targetSdk.
            # Snapshot caching keeps the boot fast despite the heavier image.
            API_LEVEL: '34'
            # AOSP `default` x86_64 — lightest/fastest image. (The LSPatch
            # metaloader crash reproduces identically on google_apis, so the
            # image is not the variable; keep the fast one.)
            AVD_TARGET: default
            AVD_ARCH: x86_64
            # Shared emulator flags. The create step appends nothing (so a
            # snapshot is SAVED on exit); the run step adds `-no-snapshot-save`
            # (LOAD the saved snapshot, don't re-save).
            EMU_OPTIONS: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none

        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: '17'

            - name: Set up Gradle (with build cache)
              uses: gradle/actions/setup-gradle@v4
              with:
                  develocity-injection-enabled: false

            - name: Remove Develocity auto-injection init script
              run: |
                  init_dir="${GRADLE_USER_HOME:-$HOME/.gradle}/init.d"
                  rm -f "$init_dir"/*develocity*.gradle "$init_dir"/*develocity*.init.gradle 2>/dev/null || true

            - name: Assemble victim + module APKs
              run: ./gradlew -p examples/android :victim:assembleDebug :module:assembleDebug --stacktrace

            # rosetta-xposed#22 cache-invalidation phase: a SECOND victim APK
            # with a bumped versionCode (101) — same code, different identity —
            # so installing it as an update flips the module's persistent-cache
            # fingerprint and forces a re-discovery. Copied out immediately so it
            # does not clobber the v100 APK at the same output path.
            - name: Assemble version-bumped victim APK (for cache invalidation)
              run: |
                  set -euo pipefail
                  ./gradlew -p examples/android :victim:assembleDebug -PvictimVersionCode=101 --stacktrace
                  BUMPED_SRC=$(find examples/android/victim -name '*-debug.apk' | head -1)
                  mkdir -p victim-bumped
                  cp "$BUMPED_SRC" victim-bumped/victim-v101-debug.apk
                  echo "VICTIM_BUMPED=$PWD/victim-bumped/victim-v101-debug.apk" >> "$GITHUB_ENV"
                  # Re-assemble v100 so the default APK path holds the base version
                  # for the static + first-launch dynamic assertions.
                  ./gradlew -p examples/android :victim:assembleDebug --stacktrace

            # LSPatch's jar is compiled for JDK 21 (class file 65.0); the Gradle
            # build above needs JDK 17. Install 21 too and invoke LSPatch with it
            # explicitly (via $JAVA_HOME_21_X64) so the JDK-17 build is untouched.
            - name: Set up JDK 21 (for the LSPatch CLI)
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: '21'

            # Cache the ~11 MB LSPatch CLI so we skip the download on a cache hit.
            - name: Cache LSPatch CLI
              id: lspatch-cache
              uses: actions/cache@v4
              with:
                  path: lspatch
                  key: lspatch-${{ env.LSPATCH_TAG }}

            - name: Download LSPatch CLI (maintained fork; authenticated)
              run: |
                  set -euo pipefail
                  mkdir -p lspatch
                  # gh is preinstalled; GH_TOKEN avoids the API rate limit.
                  # JingMatrix/LSPatch is the maintained fork of the archived
                  # LSPosed/LSPatch. If the fork moves, change the --repo here.
                  # The tag is a POSITIONAL arg to `gh release download` (not
                  # --tag). Pattern matches only the release CLI asset
                  # `lspatch.jar` (NOT lspatch-debug.jar) so we get exactly one.
                  # Skip the download when the cache already provided the jar.
                  if [ ! -f lspatch/lspatch.jar ]; then
                      gh release download "$LSPATCH_TAG" \
                          --repo JingMatrix/LSPatch \
                          --pattern 'lspatch.jar' \
                          --dir lspatch
                  fi
                  jar_count=$(find lspatch -maxdepth 1 -name '*.jar' | wc -l)
                  if [ "$jar_count" -ne 1 ]; then
                      echo "ERROR: expected exactly 1 LSPatch jar, found $jar_count" >&2
                      ls -l lspatch >&2
                      exit 1
                  fi
                  LSPATCH_JAR="$(find lspatch -maxdepth 1 -name '*.jar')"
                  echo "LSPATCH_JAR=$LSPATCH_JAR" >> "$GITHUB_ENV"
                  echo "Resolved: $LSPATCH_JAR"

            - name: LSPatch — embed the module into the victim (local mode)
              run: |
                  set -euo pipefail
                  VICTIM=$(find examples/android/victim -name '*-debug.apk' | head -1)
                  MODULE=$(find examples/android/module -name '*-debug.apk' | head -1)
                  echo "victim=$VICTIM module=$MODULE"
                  # Local/embedded mode bakes the module dex into the target so the
                  # patched APK self-loads it (no manager, no root).
                  # NOTE (first-run): confirm flags against `java -jar "$LSPATCH_JAR" --help`.
                  # Across releases the patcher has accepted:  <apk> -m <module.apk> -o <outdir> --force [-l 2]
                  # LSPatch needs JDK 21 (its jar is class-file 65.0); use it explicitly.
                  "${JAVA_HOME_21_X64}/bin/java" -jar "$LSPATCH_JAR" "$VICTIM" -m "$MODULE" -o patched --force -l 2
                  PATCHED=$(find patched -name '*.apk' | head -1)
                  echo "patched=$PATCHED"
                  echo "PATCHED=$PATCHED" >> "$GITHUB_ENV"
                  # CONTROL: patch the SAME victim with NO module. If the bare
                  # LSPatch app boots (logs ticket:T-123) but the module build
                  # crashes, the fault is the module/loader interaction; if BOTH
                  # crash, it is LSPatch's metaloader in this emulator. The e2e
                  # script launches this first as a harness sanity check.
                  "${JAVA_HOME_21_X64}/bin/java" -jar "$LSPATCH_JAR" "$VICTIM" -o patched-control --force -l 2
                  PATCHED_CONTROL=$(find patched-control -name '*.apk' | head -1)
                  echo "patched_control=$PATCHED_CONTROL"
                  echo "PATCHED_CONTROL=$PATCHED_CONTROL" >> "$GITHUB_ENV"
                  # rosetta-xposed#22: patch the version-bumped (101) victim with
                  # the SAME module, for the cache-invalidation assertion. The
                  # assert script installs it as an update over the v100 app.
                  "${JAVA_HOME_21_X64}/bin/java" -jar "$LSPATCH_JAR" "$VICTIM_BUMPED" -m "$MODULE" -o patched-bumped --force -l 2
                  PATCHED_BUMPED=$(find patched-bumped -name '*.apk' | head -1)
                  echo "patched_bumped=$PATCHED_BUMPED"
                  echo "PATCHED_BUMPED=$PATCHED_BUMPED" >> "$GITHUB_ENV"

            # --- Emulator: documented snapshot-caching pattern -----------------
            # actions/cache stores the AVD + its saved snapshot. On a HIT the run
            # step restores an already-booted system (fast, and past the flaky
            # cold-boot binder race). On a MISS the create step boots once and
            # saves the snapshot; that same on-disk snapshot is reused by the run
            # step in this very job, and the cache seeds future runs.
            - name: Enable KVM
              run: |
                  echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
                      | sudo tee /etc/udev/rules.d/99-kvm4all.rules
                  sudo udevadm control --reload-rules
                  sudo udevadm trigger --name-match=kvm

            - name: Cache AVD snapshot
              id: avd-cache
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.android/avd/*
                      ~/.android/adb*
                  key: avd-v2-${{ env.API_LEVEL }}-${{ env.AVD_TARGET }}-${{ env.AVD_ARCH }}

            - name: Create AVD + save snapshot (on cache miss)
              if: steps.avd-cache.outputs.cache-hit != 'true'
              uses: reactivecircus/android-emulator-runner@v2.37.0
              with:
                  api-level: ${{ env.API_LEVEL }}
                  target: ${{ env.AVD_TARGET }}
                  arch: ${{ env.AVD_ARCH }}
                  cores: 2
                  ram-size: 4096M
                  force-avd-creation: false
                  # NOTE: no `-no-snapshot` here, so a snapshot is saved on exit.
                  emulator-options: ${{ env.EMU_OPTIONS }}
                  emulator-boot-timeout: 900
                  # The post-boot animation/`settings put` step is the source of
                  # the `Broken pipe (32)` flake and is irrelevant to a headless
                  # logcat assertion — skip it.
                  disable-animations: false
                  script: echo "Generated AVD snapshot for caching."

            - name: Run on emulator and assert the hook fired
              uses: reactivecircus/android-emulator-runner@v2.37.0
              with:
                  api-level: ${{ env.API_LEVEL }}
                  target: ${{ env.AVD_TARGET }}
                  arch: ${{ env.AVD_ARCH }}
                  cores: 2
                  ram-size: 4096M
                  force-avd-creation: false
                  # `-no-snapshot-save`: LOAD the cached snapshot, don't re-save.
                  emulator-options: ${{ env.EMU_OPTIONS }} -no-snapshot-save
                  emulator-boot-timeout: 900
                  disable-animations: false
                  # android-emulator-runner runs `script` line-by-line as separate
                  # `sh -c` invocations (dash), so multi-line loops/ifs and
                  # cross-line variables don't work inline. Keep it to ONE line
                  # that hands off to a committed bash script (full pipefail + loop
                  # support). PATCHED / PATCHED_CONTROL / PATCHED_BUMPED are read
                  # from the environment by that script (PATCHED_BUMPED drives the
                  # rosetta-xposed#22 cache-invalidation assertion; if unset, that
                  # phase is skipped, not failed).
                  script: bash "$GITHUB_WORKSPACE/examples/android/scripts/e2e-assert.sh"

            - name: Upload e2e artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: android-e2e-artifacts
                  path: |
                      patched/**/*.apk
                      patched-control/**/*.apk
                      patched-bumped/**/*.apk
                      examples/android/**/build/outputs/apk/**/*.apk
                      e2e-logcat.txt
                  retention-days: 14
