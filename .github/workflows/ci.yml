name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

# Least privilege (audit): the CI job only reads the repository — it checks
# out, builds, tests, and uploads artifacts (the artifact upload uses the job
# token, not repo write). Drop the default GITHUB_TOKEN scopes to read-only.
permissions:
    contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: build + test (JDK ${{ matrix.java }})
        runs-on: ubuntu-latest
        # Belt-and-suspenders alongside the `develocity-injection-enabled`
        # input below: the auto-injection init script reads this env var
        # directly, so pinning it here disables injection regardless of which
        # code path setup-gradle takes. Keeps strict dependency verification
        # from tripping over unpinned, injected BOM metadata.
        env:
            DEVELOCITY_INJECTION_ENABLED: 'false'
        strategy:
            fail-fast: false
            matrix:
                # The modules request a JDK 17 toolchain; we run the build on
                # 17 and 21 to catch toolchain/runtime drift early.
                java: ['17', '21']

        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK ${{ matrix.java }}
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: ${{ matrix.java }}

            - name: Set up Gradle (with build cache)
              uses: gradle/actions/setup-gradle@v4
              with:
                  # Opt out of Develocity auto-injection. setup-gradle@v4
                  # otherwise injects the Develocity (build-scan) plugin onto
                  # the buildscript `:classpath` via an init script, which
                  # drags `junit-bom` / `kotlinx-coroutines-bom` onto the
                  # classpath from the Plugin Portal. Those artifacts are NOT
                  # pinned in `gradle/verification-metadata.xml` (generated
                  # locally where there is no injection), so strict dependency
                  # verification rejects them and CI fails at configuration
                  # time. We don't publish build scans, so the clean fix is to
                  # disable the injection entirely and keep `verify-metadata`
                  # fully strict. See docs/reference/building.md.
                  develocity-injection-enabled: false

            # The full quality suite — the Kotlin equivalents of rosetta-frida's
            # format + lint + 100%-coverage + test gate:
            #   spotlessCheck → formatting (ktlint)
            #   detekt        → static analysis
            #   test          → unit + conformance suite (core is pure-JVM)
            #   koverVerify   → fails below 100% line + branch coverage
            #   build         → assemble + the standard `check` lifecycle
            - name: Quality gate (spotless + detekt + test + 100% coverage) and build
              run: ./gradlew spotlessCheck detekt test koverVerify build --stacktrace

            - name: Upload test reports
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: test-reports-jdk${{ matrix.java }}
                  path: '**/build/reports/tests/'
                  retention-days: 14
