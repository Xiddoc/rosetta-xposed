name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

# Least privilege (audit): the CI job only reads the repository — it checks
# out, builds, tests, and uploads artifacts (the artifact upload uses the job
# token, not repo write). Drop the default GITHUB_TOKEN scopes to read-only.
permissions:
    contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: build + test (JDK ${{ matrix.java }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                # The modules request a JDK 17 toolchain; we run the build on
                # 17 and 21 to catch toolchain/runtime drift early.
                java: ['17', '21']

        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK ${{ matrix.java }}
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: ${{ matrix.java }}

            - name: Set up Gradle (with build cache)
              uses: gradle/actions/setup-gradle@v4

            # The full quality suite — the Kotlin equivalents of rosetta-frida's
            # format + lint + 100%-coverage + test gate:
            #   spotlessCheck → formatting (ktlint)
            #   detekt        → static analysis
            #   test          → unit + conformance suite (core is pure-JVM)
            #   koverVerify   → fails below 100% line + branch coverage
            #   build         → assemble + the standard `check` lifecycle
            - name: Quality gate (spotless + detekt + test + 100% coverage) and build
              run: ./gradlew spotlessCheck detekt test koverVerify build --stacktrace

            - name: Upload test reports
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: test-reports-jdk${{ matrix.java }}
                  path: '**/build/reports/tests/'
                  retention-days: 14
