name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

# Least privilege (audit): the CI job only reads the repository — it checks
# out, builds, tests, and uploads artifacts (the artifact upload uses the job
# token, not repo write). Drop the default GITHUB_TOKEN scopes to read-only.
permissions:
    contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: build + test (JDK ${{ matrix.java }})
        runs-on: ubuntu-latest
        # Belt-and-suspenders alongside the `develocity-injection-enabled`
        # input below: the auto-injection init script reads this env var
        # directly, so pinning it here disables injection regardless of which
        # code path setup-gradle takes. Keeps strict dependency verification
        # from tripping over unpinned, injected BOM metadata.
        env:
            DEVELOCITY_INJECTION_ENABLED: 'false'
        strategy:
            fail-fast: false
            matrix:
                # The modules request a JDK 17 toolchain; we run the build on
                # 17 and 21 to catch toolchain/runtime drift early.
                java: ['17', '21']

        steps:
            - uses: actions/checkout@v5

            - name: Set up JDK ${{ matrix.java }}
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: ${{ matrix.java }}

            - name: Set up Gradle (with build cache)
              uses: gradle/actions/setup-gradle@v5
              with:
                  # Opt out of Develocity auto-injection. setup-gradle@v4
                  # otherwise injects the Develocity (build-scan) plugin onto
                  # the buildscript `:classpath` via an init script, which
                  # drags `junit-bom` / `kotlinx-coroutines-bom` onto the
                  # classpath from the Plugin Portal. Those artifacts are NOT
                  # pinned in `gradle/verification-metadata.xml` (generated
                  # locally where there is no injection), so strict dependency
                  # verification rejects them and CI fails at configuration
                  # time. We don't publish build scans, so the clean fix is to
                  # disable the injection entirely and keep `verify-metadata`
                  # fully strict. See docs/reference/building.md.
                  develocity-injection-enabled: false

            # Deterministic kill-switch for the Develocity auto-injection.
            # The `develocity-injection-enabled` input + DEVELOCITY_INJECTION_ENABLED
            # env are not always honoured (the injection can come from an
            # org-level Actions variable and/or be restored from the Gradle
            # user-home cache), so we also physically remove the auto-applied
            # init script from $GRADLE_USER_HOME/init.d before the build. With
            # the script gone, the Develocity plugin is never added to the
            # buildscript `:classpath`, so its unpinned junit-bom /
            # kotlinx-coroutines-bom metadata never gets resolved and strict
            # dependency verification (verify-metadata=true) stays green.
            - name: Remove Develocity auto-injection init script
              run: |
                  init_dir="${GRADLE_USER_HOME:-$HOME/.gradle}/init.d"
                  rm -f "$init_dir"/*develocity*.gradle "$init_dir"/*develocity*.init.gradle 2>/dev/null || true
                  echo "Remaining init scripts:"; ls -la "$init_dir" 2>/dev/null || echo "(no init.d)"

            # The :dexkit integration test runs the REAL DexKit native, which
            # is NOT committed (binary bloat). Build it here from pinned DexKit
            # 2.2.0 source via build-libdexkit.sh, but cache the resulting `.so`
            # so the slow source-build only reruns when the DexKit version or
            # the build script changes. The cache key is shared across the JDK
            # 17/21 matrix legs, so at most one cold build happens; the others
            # restore the prebuilt `.so` in seconds. The native lands at the
            # exact `java.library.path` the test JVM reads, so the integration
            # test finds it PRESENT and runs for real (present ⇒ run; absent ⇒
            # skip). See docs/reference/dexkit-integration.md.
            - name: Cache DexKit host native
              id: dexkit-native
              uses: actions/cache@v5
              with:
                  path: dexkit/src/test/resources/native/linux-x86_64/libdexkit.so
                  key: dexkit-native-${{ runner.os }}-x86_64-2.2.0-${{ hashFiles('tools/dexkit-native/build-libdexkit.sh') }}

            - name: Build DexKit host native (on cache miss)
              if: steps.dexkit-native.outputs.cache-hit != 'true'
              run: |
                  sudo apt-get update
                  # cmake + ninja drive the build; g++/git/zlib1g-dev are the
                  # compile deps (zlib1g-dev for DexKit Core's dynamic `z` link).
                  # The JDK (JNI headers) comes from the setup-java step above.
                  sudo apt-get install -y cmake ninja-build g++ git zlib1g-dev
                  bash tools/dexkit-native/build-libdexkit.sh

            # Cross-repo parity guard: the conformance fixtures are vendored
            # byte-identical into both rosetta-xposed (the AUTHORITATIVE copy)
            # and rosetta-frida. This fails if this repo's copy drifts from the
            # shared SHA-256 manifest (the same manifest both repos carry), so a
            # one-sided fixture edit can't silently fork the parity oracle. No
            # JVM needed, so it runs before (and independently of) the Gradle
            # build. See core/src/test/resources/conformance/README.md.
            - name: Conformance fixtures match the shared manifest
              run: sh scripts/check-conformance-fixtures.sh

            # The full quality suite — the Kotlin equivalents of rosetta-frida's
            # format + lint + 100%-coverage + test gate:
            #   spotlessCheck → formatting (ktlint)
            #   detekt        → static analysis
            #   test          → unit + conformance suite (core is pure-JVM)
            #   koverVerify   → fails below 100% line + branch coverage
            #   build         → assemble + the standard `check` lifecycle
            - name: Quality gate (spotless + detekt + test + 100% coverage) and build
              run: ./gradlew spotlessCheck detekt test koverVerify build --stacktrace

            - name: Upload test reports
              if: always()
              uses: actions/upload-artifact@v6
              with:
                  name: test-reports-jdk${{ matrix.java }}
                  path: '**/build/reports/tests/'
                  retention-days: 14

    examples-harness:
        name: examples/harness test (JDK ${{ matrix.java }})
        runs-on: ubuntu-latest
        needs: build
        env:
            DEVELOCITY_INJECTION_ENABLED: 'false'
        strategy:
            fail-fast: false
            matrix:
                java: ['17', '21']

        steps:
            - uses: actions/checkout@v5

            - name: Set up JDK ${{ matrix.java }}
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: ${{ matrix.java }}

            - name: Set up Gradle (with build cache)
              uses: gradle/actions/setup-gradle@v5
              with:
                  develocity-injection-enabled: false

            - name: Remove Develocity auto-injection init script
              run: |
                  init_dir="${GRADLE_USER_HOME:-$HOME/.gradle}/init.d"
                  rm -f "$init_dir"/*develocity*.gradle "$init_dir"/*develocity*.init.gradle 2>/dev/null || true
                  echo "Remaining init scripts:"; ls -la "$init_dir" 2>/dev/null || echo "(no init.d)"

            # Pure-JVM harness: no network calls beyond Maven Central (already
            # cached by Gradle), no Android SDK, no native libs. Required check.
            - name: Test examples/harness
              run: ./gradlew -p examples/harness test --stacktrace

            - name: Upload harness test reports
              if: always()
              uses: actions/upload-artifact@v6
              with:
                  name: test-reports-examples-harness-jdk${{ matrix.java }}
                  path: 'examples/harness/build/reports/tests/'
                  retention-days: 14

    examples-r8:
        name: examples/r8 test (JDK ${{ matrix.java }})
        runs-on: ubuntu-latest
        needs: build
        # Advisory job: examples/r8 fetches R8 from google() Maven on first
        # run. A transient registry outage should not fail the required gate —
        # mirroring the advisory pattern used in rosetta-frida's pipeline.yml
        # for network-dependent jobs. An R8 failure shows amber (not a
        # misleading green), so the signal remains visible.
        continue-on-error: true
        env:
            DEVELOCITY_INJECTION_ENABLED: 'false'
        strategy:
            fail-fast: false
            matrix:
                java: ['17', '21']

        steps:
            - uses: actions/checkout@v5

            - name: Set up JDK ${{ matrix.java }}
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: ${{ matrix.java }}

            - name: Set up Gradle (with build cache)
              uses: gradle/actions/setup-gradle@v5
              with:
                  develocity-injection-enabled: false

            - name: Remove Develocity auto-injection init script
              run: |
                  init_dir="${GRADLE_USER_HOME:-$HOME/.gradle}/init.d"
                  rm -f "$init_dir"/*develocity*.gradle "$init_dir"/*develocity*.init.gradle 2>/dev/null || true
                  echo "Remaining init scripts:"; ls -la "$init_dir" 2>/dev/null || echo "(no init.d)"

            - name: Test examples/r8
              run: ./gradlew -p examples/r8 test --stacktrace

            - name: Upload r8 test reports
              if: always()
              uses: actions/upload-artifact@v6
              with:
                  name: test-reports-examples-r8-jdk${{ matrix.java }}
                  path: 'examples/r8/build/reports/tests/'
                  retention-days: 14

    examples-android-build:
        name: examples/android assemble (advisory)
        runs-on: ubuntu-latest
        needs: build
        # Advisory: assembling the APKs needs the Android SDK (preinstalled on
        # ubuntu-latest) and reaches google() + api.xposed.info for AGP and the
        # legacy Xposed API stub. A transient registry outage must not fail the
        # required gate. This job catches compile / manifest / dex / Xposed-
        # registration regressions in examples/android that the pure-JVM jobs
        # CANNOT — that module is not on their classpath. (It is exactly the gap
        # that hid the @hide AndroidAppHelper compile error until a real build.)
        continue-on-error: true
        env:
            DEVELOCITY_INJECTION_ENABLED: 'false'

        steps:
            - uses: actions/checkout@v5

            # AGP requires JDK 17.
            - name: Set up JDK 17
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: '17'

            - name: Set up Gradle (with build cache)
              uses: gradle/actions/setup-gradle@v5
              with:
                  develocity-injection-enabled: false

            - name: Remove Develocity auto-injection init script
              run: |
                  init_dir="${GRADLE_USER_HOME:-$HOME/.gradle}/init.d"
                  rm -f "$init_dir"/*develocity*.gradle "$init_dir"/*develocity*.init.gradle 2>/dev/null || true
                  echo "Remaining init scripts:"; ls -la "$init_dir" 2>/dev/null || echo "(no init.d)"

            # ubuntu-latest ships the Android SDK preinstalled (ANDROID_HOME set),
            # so no setup-android step is needed here. NOTE: there is no pinned
            # SDK version — this relies on whatever version the runner image
            # provides. On a bare environment (no preinstalled SDK), run
            # scripts/setup-android-sdk.sh first (see CLAUDE.md).
            - name: Assemble victim + module APKs
              run: ./gradlew -p examples/android :victim:assembleDebug :module:assembleDebug --stacktrace

            - name: Upload example APKs
              if: always()
              uses: actions/upload-artifact@v6
              with:
                  name: example-apks
                  path: 'examples/android/**/build/outputs/apk/**/*.apk'
                  retention-days: 14
