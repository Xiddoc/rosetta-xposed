site_name: rosetta-xposed
site_description: >-
  Hook obfuscated Android apps from Xposed / LSPosed / LSPatch modules using
  real Java class, method, and field names. A per-version map translates them
  to the obfuscated names the running build actually uses.
site_author: rosetta-xposed contributors
site_url: https://iliketo.party/rosetta-xposed/
repo_url: https://github.com/Xiddoc/rosetta-xposed
repo_name: Xiddoc/rosetta-xposed
edit_uri: edit/master/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
  palette:
    - scheme: slate
      media: "(prefers-color-scheme: dark)"
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      media: "(prefers-color-scheme: light)"
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Xiddoc/rosetta-xposed

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      lang: en

nav:
  - Home: index.md
  - Getting started:
      - Concepts: getting-started/concepts.md
      - Usage: getting-started/usage.md
      - Build-time maps: getting-started/build-time-maps.md
  - Reference:
      - Resolution backends: reference/backends.md
      - DexKit integration: reference/dexkit-integration.md
      - Building: reference/building.md
      - Status: reference/status.md
      - Related repos: reference/related.md
